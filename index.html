<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-blur {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blur.purple { background: #7c3aed; top: -100px; left: -100px; }
    .bg-blur.pink   { background: #ec4899; bottom: -100px; right: -100px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
    }

    /* ─── INTRO ─── */
    #intro {
      text-align: center;
      animation: fadeIn .6s ease;
    }
    #intro .emoji { font-size: 64px; margin-bottom: 16px; display: block; }
    #intro h1 {
      font-size: 26px; font-weight: 800;
      line-height: 1.4;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #intro p {
      margin-top: 12px; font-size: 15px;
      color: #94a3b8; line-height: 1.6;
    }
    #intro .meta {
      display: flex; justify-content: center; gap: 20px;
      margin: 20px 0;
    }
    #intro .meta span {
      font-size: 13px; color: #64748b;
      background: #1e1e2e; padding: 6px 14px;
      border-radius: 20px; border: 1px solid #2d2d44;
    }
    .btn-start {
      display: inline-block; margin-top: 8px;
      padding: 16px 48px; font-size: 17px; font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: none; border-radius: 50px; color: #fff;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(124,58,237,.4);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,.5); }

    /* ─── QUIZ ─── */
    #quiz { display: none; }

    .progress-wrap {
      margin-bottom: 20px;
    }
    .progress-info {
      display: flex; justify-content: space-between;
      font-size: 13px; color: #64748b; margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px; background: #1e1e2e; border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 10px;
      transition: width .4s ease;
    }

    .question-card {
      background: #161628;
      border: 1px solid #2d2d44;
      border-radius: 20px;
      padding: 28px 24px;
      animation: slideUp .4s ease;
    }
    .question-label {
      font-size: 12px; font-weight: 600; letter-spacing: 1px;
      color: #7c3aed; margin-bottom: 10px;
      text-transform: uppercase;
    }
    .category-badge {
      display: inline-block;
      font-size: 11px; padding: 3px 10px;
      background: #1e1e2e; border: 1px solid #2d2d44;
      border-radius: 20px; color: #a78bfa;
      margin-bottom: 14px;
    }
    .question-text {
      font-size: 19px; font-weight: 700; line-height: 1.5;
      margin-bottom: 22px; color: #f1f5f9;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: 14px;
      background: #1e1e2e; border: 1.5px solid #2d2d44;
      color: #e2e8f0; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all .2s; text-align: left;
    }
    .option-btn:hover {
      border-color: #7c3aed; background: #1e1e38;
      transform: translateX(4px);
    }
    .option-btn.selected {
      border-color: #ec4899;
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(236,72,153,.15));
      color: #fff;
    }
    .option-key {
      width: 32px; height: 32px; border-radius: 10px;
      background: #2d2d44; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      transition: background .2s;
    }
    .option-btn.selected .option-key {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
    }

    .nav-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px;
    }
    .btn-nav {
      padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; transition: all .2s;
    }
    .btn-prev {
      background: #1e1e2e; border: 1.5px solid #2d2d44; color: #94a3b8;
    }
    .btn-prev:hover { border-color: #4a4a6a; color: #fff; }
    .btn-next {
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,.35);
    }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,.45); }
    .btn-next:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    /* ─── RESULT ─── */
    #result { display: none; animation: fadeIn .6s ease; }

    .result-header { text-align: center; margin-bottom: 28px; }
    .result-header .emoji { font-size: 52px; margin-bottom: 10px; display: block; }
    .result-header h2 {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .result-header p { font-size: 14px; color: #64748b; margin-top: 6px; }

    .result-section { margin-bottom: 20px; }
    .section-title {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      color: #7c3aed; text-transform: uppercase; margin-bottom: 10px;
      padding-left: 4px;
    }
    .advice-box {
      background: #161628; border: 1px solid #2d2d44;
      border-radius: 18px; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 0;
    }
    .advice-line {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 14px; color: #cbd5e1; line-height: 1.7;
      padding: 12px 0;
    }
    .advice-line + .advice-line { border-top: 1px solid #1e1e38; }
    .advice-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 8px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
    }

    .big-types {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin: 24px 0;
    }
    .type-card {
      background: #161628; border: 1px solid #2d2d44;
      border-radius: 16px; padding: 16px; text-align: center;
    }
    .type-card .icon { font-size: 28px; margin-bottom: 6px; }
    .type-card .name {
      font-size: 14px; font-weight: 700; color: #f1f5f9;
    }
    .type-card .sub { font-size: 12px; color: #64748b; margin-top: 2px; }

    .btn-row {
      display: flex; gap: 10px; margin-top: 24px;
    }
    .btn-retry, .btn-copy {
      flex: 1; padding: 14px; border-radius: 14px;
      font-size: 14px; font-weight: 700; border: none; cursor: pointer;
      transition: all .2s;
    }
    .btn-retry {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,.35);
    }
    .btn-retry:hover { transform: translateY(-1px); }
    .btn-copy {
      background: #1e1e2e; border: 1.5px solid #2d2d44; color: #94a3b8;
    }
    .btn-copy:hover { border-color: #4a4a6a; color: #fff; }

    .vibe-cta {
      text-align: center; margin-top: 20px; margin-bottom: 4px;
      padding: 20px;
      background: #161628; border: 1px solid #2d2d44; border-radius: 16px;
    }
    .vibe-cta p {
      font-size: 14px; color: #94a3b8; line-height: 1.7; margin: 0 0 16px;
    }
    .vibe-btn {
      display: block; width: 100%;
      padding: 13px; border-radius: 12px; margin-bottom: 8px;
      font-size: 14px; font-weight: 700; border: none; cursor: pointer;
      transition: all .2s; text-decoration: none;
    }
    .vibe-btn:last-child { margin-bottom: 0; }
    .vibe-btn-main {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,.3);
    }
    .vibe-btn-main:hover { transform: translateY(-1px); }
    .vibe-btn-sub {
      background: #1e1e2e; border: 1.5px solid #2d2d44; color: #c4b5fd;
    }
    .vibe-btn-sub:hover { border-color: #7c3aed; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

      <div class="meta">
        <span>📋 20문항</span>
        <span>⏱ 약 2분</span>
        <span>✨ vibe 앱 연동</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
    </div>

    <!-- QUIZ -->
    <div id="quiz">
      <div class="progress-wrap">
        <div class="progress-info">

        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="question-card" id="q-card">
        <!-- injected by JS -->
      </div>
      <div class="nav-row">
        <button class="btn-nav btn-prev" onclick="prevQ()" id="btn-prev">← 이전</button>
        <button class="btn-nav btn-next" onclick="nextQ()" id="btn-next" disabled>다음 →</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result"></div>

  </div>

  <script type="module">
    // ── Firebase 저장 ──
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseApp = initializeApp({
      apiKey: "AIzaSyAw8Wdw_c-k9DZa9EWyKB3WCnBC5HEMTzA",
      authDomain: "vibe-56a26.firebaseapp.com",
      projectId: "vibe-56a26",
      appId: "1:811210478039:web:2e8944c322d4b78d2cfb92"
    });
    const db = getFirestore(firebaseApp);

    // URL에서 uid 파싱
    const uid = new URLSearchParams(window.location.search).get('uid');

    async function saveVibeType(type) {
      if (!uid) return;
      try {
        await updateDoc(doc(db, 'users', uid), { vibeType: type });
        console.log('vibe 유형 저장 완료:', type);
      } catch (e) {
        console.error('저장 실패:', e);
      }
    }

    // 전역 함수로 노출
    window.saveVibeType = saveVibeType;
    window.uid = uid;
  </script>

        options: ["오래 생각하고 정리", "빨리 털고 새출발", "시간이 해결해줌", "솔직하게 감정 표현 후 정리"],
        types: ["E", "F", "S", "X"],
        icons: ["🌧️", "🌅", "⏰", "💬"]
      },
      {
        id: 17, category: "💡 관계 가치",
        text: "관계에서 제일 중요한 가치는?",
        options: ["감정적 교감", "서로의 독립적인 공간", "신뢰와 안정감", "솔직한 소통"],
        types: ["E", "F", "S", "X"],
        icons: ["💞", "🦅", "🔐", "🎯"]
      },
      {
        id: 18, category: "😍 호감 표현",
        text: "좋아하는 사람에게 나는?",
        options: ["감정 숨기기 어려움", "자연스럽게 천천히", "확신이 생길 때 표현", "티 많이 내고 직접 표현"],
        types: ["E", "F", "S", "X"],
        icons: ["😳", "🌿", "🤔", "📣"]
      },
      {
        id: 19, category: "🎭 연애 스타일",
        text: "연애할 때 나는?",
        options: ["감정 기복이 있는 편", "내 공간이 필요한 편", "한결같고 믿음직한 편", "표현이 많은 편"],
        types: ["E", "F", "S", "X"],
        icons: ["🎢", "🌊", "⚓", "🔥"]
      },
      {
        id: 20, category: "✨ 나의 연애 한줄",
        text: "연애할 때 나를 표현하면?",
        options: ["감정이 풍부한 사람", "자유로운 사람", "든든한 사람", "표현 많은 사람"],
        types: ["E", "F", "S", "X"],
        icons: ["💓", "🦋", "🧘", "🔥"]
      }
    ];

    let current = 0;
    const answers = new Array(20).fill(null);

    function startQuiz() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('quiz').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      const sel = answers[current];

      document.getElementById('q-count').textContent = `${current + 1} / 20`;
      const pct = Math.round((current / 20) * 100);
      document.getElementById('q-percent').textContent = pct + '%';
      document.getElementById('prog-fill').style.width = pct + '%';

      document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
      document.getElementById('btn-next').textContent = current === 19 ? '결과 보기 🎉' : '다음 →';
      document.getElementById('btn-next').disabled = sel === null;

      const keys = ['A', 'B', 'C', 'D'];
      document.getElementById('q-card').innerHTML = `
        <div class="question-label">Q${q.id}</div>
        <div class="category-badge">${q.category}</div>
        <div class="question-text">${q.text}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option-btn ${sel === i ? 'selected' : ''}" onclick="selectOption(${i})">
              <span class="option-key">${keys[i]}</span>
              <span>${q.icons[i]} ${opt}</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function selectOption(i) {
      answers[current] = i;
      document.getElementById('btn-next').disabled = false;
      renderQuestion();
    }

    function nextQ() {
      if (answers[current] === null) return;
      if (current === 19) { showResult(); return; }
      current++;
      renderQuestion();
    }

    function prevQ() {
      if (current === 0) return;
      current--;
      renderQuestion();
    }

    function calcType() {
      const score = { E: 0, F: 0, S: 0, X: 0 };
      questions.forEach((q, i) => {
        if (answers[i] !== null) score[q.types[answers[i]]]++;
      });
      return Object.entries(score).sort((a, b) => b[1] - a[1])[0][0];
    }

    function showResult() {
      document.getElementById('quiz').style.display = 'none';
      const el = document.getElementById('result');
      el.style.display = 'block';

      const type = calcType();
      // Firebase에 vibe 유형 저장
      if (window.saveVibeType) window.saveVibeType(type);
      const t = typeData[type];
      const matchT = typeData[t.match];

      const adviceHTML = t.advice.map(line => `
        <div class="advice-line">
          <span class="advice-dot"></span>
          <span>${line}</span>
        </div>
      `).join('');

      el.innerHTML = `
        <div class="result-header">
          <span class="emoji">${t.emoji}</span>
          <h2>${t.name}</h2>
          <p>${t.desc}</p>
        </div>

        <div class="section-title">⭐ 최고 궁합</div>
        <div style="background:#161628;border:1px solid #2d2d44;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;">
          <span style="font-size:36px">${matchT.emoji}</span>
          <div>
            <div style="font-size:16px;font-weight:700;color:#f1f5f9;">${matchT.name}</div>
            <div style="font-size:13px;color:#64748b;margin-top:3px;">${matchT.desc}</div>
          </div>
        </div>

        <div class="section-title">💬 나에게 한마디</div>
        <div class="advice-box">${adviceHTML}</div>

        <div class="vibe-cta">
          <p>이 유형끼리 만나면 진짜 잘 맞는 편임 👀</p>
          <a class="vibe-btn vibe-btn-main" href="https://vibe-56a26.web.app" target="_blank">👉 ${matchT.name} 만나러 가기</a>
        </div>

        <div class="btn-row">
          <button class="btn-retry" onclick="retryQuiz()">🔄 다시 하기</button>
          <button class="btn-copy" onclick="copyResult()">📋 결과 복사</button>
        </div>
      `;

      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function retryQuiz() {
      answers.fill(null);
      current = 0;
      document.getElementById('result').style.display = 'none';
      document.getElementById('intro').style.display = 'block';
    }

    function copyResult() {
      const type = calcType();
      const t = typeData[type];
      const matchT = typeData[t.match];
      const advice = t.advice.map(l => `• ${l}`).join('\n');
      const text = `${t.emoji} 나의 연애 유형: ${t.name}\n${t.desc}\n\n⭐ 최고 궁합: ${matchT.name}\n\n💬 나에게 한마디\n${advice}\n\n#연애유형테스트`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = '✅ 복사됨!';
        setTimeout(() => btn.textContent = '📋 결과 복사', 2000);
      });
    }
  </script>
</body>
</html>
