      if (current === 0) return;
      current--;
      renderQuestion();
    }

    function calcVibe() {
      const s = { "새벽 감성형":0, "즉흥 에너지형":0, "집콕형":0, "표현형":0, "음악형":0, "잔잔형":0 };
      questions.slice(0, 10).forEach((q, i) => {
        const score = answers[i] ?? 3;
        q.target.forEach(t => s[t] += score);
      });
      return Object.entries(s).sort((a,b) => b[1]-a[1])[0][0];
    }

    function calcLove() {
      let contactScore = 0;
      const t = { "안정형":0, "설렘형":0, "표현형":0, "친구형":0 };
      questions.slice(10).forEach((q, i) => {
        const score = answers[10 + i] ?? 3;
        q.target.forEach(key => {
          if      (key === "contact+") contactScore += score;
          else if (key === "contact-") contactScore -= score;
          else t[key] += score;
        });
      });
      const contactStyle = contactScore >= 3 ? "연락 잦음" : contactScore <= -3 ? "연락 적음" : "연락 적당";
      const loveType = Object.entries(t).sort((a,b) => b[1]-a[1])[0][0];
      return { contactStyle, loveType };
    }

    function showResult() {
      document.getElementById('quiz').style.display = 'none';
      const el = document.getElementById('result');
      el.style.display = 'block';

      const vibe = calcVibe();
      const { contactStyle, loveType } = calcLove();
      const v = vibeData[vibe];
      const matchV = vibeData[v.matchVibe];

      if (window.saveVibeType) window.saveVibeType(vibe);

      const adviceHTML = v.advice.map(line => `
        <div class="advice-line"><span class="advice-dot"></span><span>${line}</span></div>
      `).join('');

      el.innerHTML = `
        <div class="result-header">
          <span class="emoji">${v.emoji}</span>
          <h2>${vibe}</h2>
          <p>${v.desc}</p>
        </div>

        <div class="section-title">📊 나의 연애 성향</div>
        <div class="love-badges">
          <span class="love-badge">💬 ${contactStyle}</span>
          <span class="love-badge">❤️ ${loveType}</span>
        </div>

        <div class="section-title">✨ 잘 맞는 바이브</div>
        <div style="background:#161628;border:1px solid #2d2d44;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;">
          <span style="font-size:36px">${matchV.emoji}</span>
          <div>
            <div style="font-size:16px;font-weight:700;color:#f1f5f9;">${v.matchVibe}</div>
            <div style="font-size:13px;color:#64748b;margin-top:3px;">${matchV.desc}</div>
          </div>
        </div>

        <div class="section-title">💬 나에게 한마디</div>
        <div class="advice-box">${adviceHTML}</div>

        <div class="vibe-cta">
          <p>이 유형끼리 만나면 진짜 잘 맞는 편임 👀</p>
          <a class="vibe-btn vibe-btn-main" href="https://vibe-56a26.web.app" target="_blank">👉 나랑 진짜 맞는 사람 찾기</a>
        </div>

        <div class="btn-row">
          <button class="btn-retry" onclick="retryQuiz()">🔄 다시 하기</button>
          <button class="btn-copy" onclick="copyResult()">📋 결과 복사</button>
        </div>
      `;
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function retryQuiz() {
      answers.fill(null);
      current = 0;
      document.getElementById('result').style.display = 'none';
      document.getElementById('intro').style.display = 'block';
    }

    function copyResult() {
      const vibe = calcVibe();
      const { contactStyle, loveType } = calcLove();
      const v = vibeData[vibe];
      const advice = v.advice.map(l => `• ${l}`).join('\n');
      const text = `${v.emoji} 나의 바이브: ${vibe}\n${v.desc}\n\n📊 연애 성향: ${contactStyle} / ${loveType}\n✨ 잘 맞는 바이브: ${v.matchVibe}\n\n💬 나에게 한마디\n${advice}\n\n#바이브테스트`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = '✅ 복사됨!';
        setTimeout(() => btn.textContent = '📋 결과 복사', 2000);
      });
    }
  </script>
</body>
</html>
